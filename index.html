<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Kitchen Order System - Welcome</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    max-width: 1200px;
    width: 100%;
}

.welcome-card {
    background: white;
    border-radius: 30px;
    padding: 50px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: fadeInUp 0.6s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.logo {
    font-size: 4rem;
    margin-bottom: 20px;
}

h1 {
    font-size: 2.5rem;
    color: #1e3c72;
    margin-bottom: 10px;
}

.subtitle {
    color: #666;
    font-size: 1.1rem;
    margin-bottom: 40px;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 20px;
}

.buttons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    margin-bottom: 40px;
}

.dashboard-btn {
    background: white;
    border: none;
    border-radius: 20px;
    padding: 30px 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
}

.dashboard-btn:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.btn-icon {
    font-size: 3rem;
    margin-bottom: 15px;
}

.dashboard-btn h3 {
    font-size: 1.5rem;
    margin-bottom: 10px;
}

.dashboard-btn p {
    color: #666;
    font-size: 0.9rem;
}

.btn-chef {
    border-top: 5px solid #3498db;
}
.btn-chef:hover { background: linear-gradient(135deg, #3498db10, #3498db05); }

.btn-admin {
    border-top: 5px solid #e74c3c;
}
.btn-admin:hover { background: linear-gradient(135deg, #e74c3c10, #e74c3c05); }

.btn-store {
    border-top: 5px solid #27ae60;
}
.btn-store:hover { background: linear-gradient(135deg, #27ae6010, #27ae6005); }

.info-section {
    background: #f8f9fa;
    border-radius: 20px;
    padding: 25px;
    margin-top: 20px;
}

.info-section h4 {
    color: #1e3c72;
    margin-bottom: 15px;
    font-size: 1.1rem;
}

.stats-row {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.stat-item {
    text-align: center;
}

.stat-number {
    font-size: 1.8rem;
    font-weight: bold;
    color: #e94560;
}

.stat-label {
    font-size: 0.8rem;
    color: #666;
}

.footer {
    margin-top: 30px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    font-size: 0.8rem;
}

@media (max-width: 768px) {
    .welcome-card {
        padding: 30px 20px;
    }
    
    h1 {
        font-size: 1.8rem;
    }
    
    .buttons-grid {
        grid-template-columns: 1fr;
        gap: 15px;
    }
    
    .dashboard-btn {
        padding: 20px;
    }
    
    .btn-icon {
        font-size: 2rem;
    }
    
    .dashboard-btn h3 {
        font-size: 1.2rem;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="welcome-card">
        <div class="logo">🍳</div>
        <h1>Kitchen Order System</h1>
        <div class="subtitle">Complete Kitchen Management Solution</div>

        <div class="buttons-grid">
            <!-- Chef Dashboard Button -->
            <button class="dashboard-btn btn-chef" onclick="openChefDashboard()">
                <div class="btn-icon">👨‍🍳</div>
                <h3>Chef Dashboard</h3>
                <p>Submit kitchen orders, request items, track approvals</p>
            </button>

            <!-- Admin Dashboard Button -->
            <button class="dashboard-btn btn-admin" onclick="openAdminDashboard()">
                <div class="btn-icon">👑</div>
                <h3>Admin Dashboard</h3>
                <p>Approve/reject orders, manage inventory, view reports</p>
            </button>

            <!-- Storekeeper Dashboard Button -->
            <button class="dashboard-btn btn-store" onclick="openStorekeeperDashboard()">
                <div class="btn-icon">📦</div>
                <h3>Storekeeper Dashboard</h3>
                <p>Manage inventory, track stock levels, receive orders</p>
            </button>
        </div>

        <div class="info-section">
            <h4>📊 System Overview</h4>
            <div class="stats-row" id="systemStats">
                <div class="stat-item">
                    <div class="stat-number" id="totalRequests">0</div>
                    <div class="stat-label">Total Requests</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="pendingRequests">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="approvedRequests">0</div>
                    <div class="stat-label">Approved</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="rejectedRequests">0</div>
                    <div class="stat-label">Rejected</div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>Kitchen Order System © 2024 | All rights reserved</p>
    </div>
</div>

<script>
function getRequests() {
    let data = localStorage.getItem("kitchen_requests");
    return data ? JSON.parse(data) : [];
}

function updateSystemStats() {
    const requests = getRequests();
    
    let total = requests.length;
    let pending = 0, approved = 0, rejected = 0;
    
    requests.forEach(req => {
        const allApproved = req.items.every(i => i.status === "approved");
        const allRejected = req.items.every(i => i.status === "rejected");
        
        if(allApproved) approved++;
        else if(allRejected) rejected++;
        else pending++;
    });
    
    document.getElementById("totalRequests").innerText = total;
    document.getElementById("pendingRequests").innerText = pending;
    document.getElementById("approvedRequests").innerText = approved;
    document.getElementById("rejectedRequests").innerText = rejected;
}

function openChefDashboard() {
    window.location.href = "chef.html";
}

function openAdminDashboard() {
    window.location.href = "admin.html";
}

function openStorekeeperDashboard() {
    window.location.href = "storekeeper.html";
}

// Update stats every 5 seconds
updateSystemStats();
setInterval(updateSystemStats, 5000);
</script>
</body>
</html>
