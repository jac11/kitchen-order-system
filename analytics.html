<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Analytics Dashboard - Kitchen Orders</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }

.header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 16px 24px; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.header h1 { font-size: 1.4rem; }
.header span { color: #e94560; }
.btn-back { background: rgba(255,255,255,0.2); border: none; padding: 8px 20px; border-radius: 25px; color: white; cursor: pointer; }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
.stat-card { background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.stat-number { font-size: 2.5rem; font-weight: bold; color: #e94560; }
.stat-label { color: #666; margin-top: 5px; }

.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; margin-bottom: 30px; }
.chart-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.chart-card h3 { margin-bottom: 20px; color: #1e3c72; border-left: 4px solid #3498db; padding-left: 12px; }
.chart-container { position: relative; height: 300px; }

.table-card { background: white; border-radius: 16px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.table-card h3 { margin-bottom: 20px; color: #1e3c72; border-left: 4px solid #3498db; padding-left: 12px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
th { background: #f8f9fa; font-weight: 600; color: #555; }

.filters { display: flex; gap: 15px; margin-bottom: 24px; flex-wrap: wrap; background: white; padding: 15px; border-radius: 16px; align-items: center; }
.filters label { font-weight: 600; color: #555; }
.filters select, .filters input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; }

@media (max-width: 768px) {
    .container { padding: 16px; }
    .charts-grid { grid-template-columns: 1fr; }
    .stats-grid { gap: 10px; }
    .stat-card { padding: 12px; }
    .stat-number { font-size: 1.5rem; }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <h1>📊 Analytics Dashboard <span>| Kitchen Orders</span></h1>
        <button class="btn-back" onclick="window.close()">← Back to Admin</button>
    </div>
</div>

<div class="container">
    <div class="filters">
        <label>📅 From:</label>
        <input type="date" id="dateFrom">
        <label>To:</label>
        <input type="date" id="dateTo">
        <label>🍽️ Kitchen:</label>
        <select id="kitchenFilter">
            <option value="all">All Kitchens</option>
            <option value="Hot Kitchen">🔥 Hot Kitchen</option>
            <option value="Cold Kitchen">❄️ Cold Kitchen</option>
            <option value="Pastry">🍰 Pastry</option>
            <option value="Butchery">🥩 Butchery</option>
            <option value="Beach House">🏖️ Beach House</option>
            <option value="Nihon Kitchen">🍜 Nihon Kitchen</option>
            <option value="Staff Kitchen">👥 Staff Kitchen</option>
        </select>
        <button class="btn-back" style="background:#3498db; color:white;" onclick="refreshAnalytics()">🔄 Update</button>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>📦 Top Requested Items</h3>
            <div class="chart-container">
                <canvas id="topItemsChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>🍽️ Requests by Kitchen</h3>
            <div class="chart-container">
                <canvas id="kitchenChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>✅ Approval Status Overview</h3>
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>📈 Requests Over Time</h3>
            <div class="chart-container">
                <canvas id="timelineChart"></canvas>
            </div>
        </div>
    </div>

    <div class="table-card">
        <h3>📋 Detailed Item Report</h3>
        <div style="overflow-x: auto;">
            <table id="detailsTable">
                <thead>
                    <tr><th>Item Name</th><th>Total Requested</th><th>Total Approved</th><th>Total Rejected</th><th>Approval Rate</th></tr>
                </thead>
                <tbody id="detailsTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let topItemsChart, kitchenChart, statusChart, timelineChart;

function getRequests() {
    let data = localStorage.getItem("kitchen_requests");
    return data ? JSON.parse(data) : [];
}

function filterByDate(requests, fromDate, toDate) {
    if(!fromDate && !toDate) return requests;
    return requests.filter(req => {
        const reqDate = new Date(req.submittedAt);
        if(fromDate && new Date(fromDate) > reqDate) return false;
        if(toDate) {
            const endDate = new Date(toDate);
            endDate.setHours(23, 59, 59);
            if(endDate < reqDate) return false;
        }
        return true;
    });
}

function refreshAnalytics() {
    let requests = getRequests();
    
    const kitchenFilter = document.getElementById("kitchenFilter").value;
    if(kitchenFilter !== "all") {
        requests = requests.filter(r => r.section === kitchenFilter);
    }
    
    const dateFrom = document.getElementById("dateFrom").value;
    const dateTo = document.getElementById("dateTo").value;
    requests = filterByDate(requests, dateFrom, dateTo);
    
    updateStats(requests);
    updateTopItemsChart(requests);
    updateKitchenChart(requests);
    updateStatusChart(requests);
    updateTimelineChart(requests);
    updateDetailsTable(requests);
}

function updateStats(requests) {
    let totalRequests = requests.length;
    let totalItems = 0;
    let totalApproved = 0;
    let totalRejected = 0;
    
    requests.forEach(req => {
        req.items.forEach(item => {
            totalItems += item.originalQty;
            if(item.status === "approved") totalApproved += item.approvedQty || 0;
            if(item.status === "rejected") totalRejected += item.originalQty;
        });
    });
    
    document.getElementById("statsGrid").innerHTML = `
        <div class="stat-card"><div class="stat-number">${totalRequests}</div><div class="stat-label">Total Requests</div></div>
        <div class="stat-card"><div class="stat-number">${totalItems}</div><div class="stat-label">Total Items Requested</div></div>
        <div class="stat-card"><div class="stat-number">${totalApproved}</div><div class="stat-label">Total Approved</div></div>
        <div class="stat-card"><div class="stat-number">${totalRejected}</div><div class="stat-label">Total Rejected</div></div>
    `;
}

function updateTopItemsChart(requests) {
    const itemMap = new Map();
    requests.forEach(req => {
        req.items.forEach(item => {
            const current = itemMap.get(item.name) || 0;
            itemMap.set(item.name, current + item.originalQty);
        });
    });
    
    const sorted = Array.from(itemMap.entries()).sort((a,b) => b[1] - a[1]).slice(0, 10);
    const labels = sorted.map(i => i[0]);
    const data = sorted.map(i => i[1]);
    
    if(topItemsChart) topItemsChart.destroy();
    const ctx = document.getElementById('topItemsChart').getContext('2d');
    topItemsChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: labels, datasets: [{ label: 'Quantity Requested', data: data, backgroundColor: '#3498db', borderRadius: 8 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
    });
}

function updateKitchenChart(requests) {
    const kitchenMap = new Map();
    requests.forEach(req => {
        const current = kitchenMap.get(req.section) || 0;
        kitchenMap.set(req.section, current + 1);
    });
    
    const labels = Array.from(kitchenMap.keys());
    const data = Array.from(kitchenMap.values());
    const colors = ['#e74c3c', '#3498db', '#f39c12', '#8e44ad', '#1abc9c', '#e91e63', '#95a5a6'];
    
    if(kitchenChart) kitchenChart.destroy();
    const ctx = document.getElementById('kitchenChart').getContext('2d');
    kitchenChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: labels, datasets: [{ data: data, backgroundColor: colors.slice(0, labels.length), borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
    });
}

function updateStatusChart(requests) {
    let approved = 0, rejected = 0, pending = 0;
    requests.forEach(req => {
        req.items.forEach(item => {
            if(item.status === "approved") approved++;
            else if(item.status === "rejected") rejected++;
            else pending++;
        });
    });
    
    if(statusChart) statusChart.destroy();
    const ctx = document.getElementById('statusChart').getContext('2d');
    statusChart = new Chart(ctx, {
        type: 'pie',
        data: { labels: ['✅ Approved', '❌ Rejected', '⏳ Pending'], datasets: [{ data: [approved, rejected, pending], backgroundColor: ['#27ae60', '#e74c3c', '#f39c12'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
}

function updateTimelineChart(requests) {
    const dateMap = new Map();
    requests.forEach(req => {
        const date = req.submittedAt.split(',')[0];
        const current = dateMap.get(date) || 0;
        dateMap.set(date, current + 1);
    });
    
    const sorted = Array.from(dateMap.entries()).sort((a,b) => new Date(a[0]) - new Date(b[0]));
    const labels = sorted.map(d => d[0]);
    const data = sorted.map(d => d[1]);
    
    if(timelineChart) timelineChart.destroy();
    const ctx = document.getElementById('timelineChart').getContext('2d');
    timelineChart = new Chart(ctx, {
        type: 'line',
        data: { labels: labels, datasets: [{ label: 'Number of Requests', data: data, borderColor: '#e94560', backgroundColor: 'rgba(233,69,96,0.1)', fill: true, tension: 0.3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
    });
}

function updateDetailsTable(requests) {
    const itemMap = new Map();
    requests.forEach(req => {
        req.items.forEach(item => {
            if(!itemMap.has(item.name)) {
                itemMap.set(item.name, { requested: 0, approved: 0, rejected: 0 });
            }
            const stats = itemMap.get(item.name);
            stats.requested += item.originalQty;
            if(item.status === "approved") stats.approved += item.approvedQty || 0;
            if(item.status === "rejected") stats.rejected += item.originalQty;
        });
    });
    
    const sorted = Array.from(itemMap.entries()).sort((a,b) => b[1].requested - a[1].requested);
    const tbody = document.getElementById("detailsTableBody");
    tbody.innerHTML = "";
    sorted.forEach(([name, stats]) => {
        const rate = stats.requested > 0 ? ((stats.approved / stats.requested) * 100).toFixed(1) : 0;
        tbody.innerHTML += `
            <tr>
                <td><strong>${name}</strong></td>
                <td>${stats.requested}</td>
                <td><span style="color:#27ae60;">${stats.approved}</span></td>
                <td><span style="color:#e74c3c;">${stats.rejected}</span></td>
                <td><span style="color:#3498db;">${rate}%</span></td>
            </tr>
        `;
    });
}

// Set default dates (last 30 days)
function setDefaultDates() {
    const to = new Date();
    const from = new Date();
    from.setDate(from.getDate() - 30);
    document.getElementById("dateTo").value = to.toISOString().split('T')[0];
    document.getElementById("dateFrom").value = from.toISOString().split('T')[0];
}

setDefaultDates();
refreshAnalytics();
setInterval(refreshAnalytics, 10000);
</script>
</body>
</html>
